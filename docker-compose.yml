services:
  server:
    environment:
      - PORT=${PORT:-4000}
      - DB_CONNECTION_STRING=mongodb://admin:${MONGO_PASSWORD}@db:27017/wellaware?authSource=admin
      - JWT_PRIVATE_KEY=./private-key.pem
      - JWT_PUBLIC_KEY=./public-key.pem
      - FIREBASE_SERVICE_ACCOUNT_PATH=/usr/src/app/serviceAccountKey.json
      - OTA_ADMIN_SECRET=${OTA_ADMIN_SECRET}
      - OTA_DOWNLOAD_TOKEN=${OTA_DOWNLOAD_TOKEN}
      - API_BASE_URL=${API_BASE_URL}
    depends_on:
      - db

  db:
    image: mongo:7
    
    restart: always

    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PASSWORD}

    volumes:
      - mongo_data:/data/db

    command: ["mongod", "--auth", "--bind_ip_all"]

    ports:
      - "127.0.0.1:27017:27017"

volumes:
  mongo_data: